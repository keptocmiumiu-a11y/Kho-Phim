<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kho phim riêng</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      scroll-behavior: smooth;
    }

    body {
      overflow-x: hidden;
    }

    .hidden {
      display: none !important;
    }

    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.65)),
        radial-gradient(circle at top, #1e293b, #000 70%);
    }

    .login-box {
      width: 100%;
      max-width: 420px;
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    .login-box h1 {
      margin: 0 0 10px;
      font-size: 32px;
      text-align: center;
    }

    .login-box p {
      margin: 0 0 18px;
      color: #cbd5e1;
      text-align: center;
      line-height: 1.5;
    }

    .login-box input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #475569;
      background: #0b1220;
      color: #fff;
      font-size: 16px;
      outline: none;
      margin-bottom: 12px;
    }

    .login-box button {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 14px;
      background: #ef4444;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .error {
      margin-top: 10px;
      color: #fca5a5;
      text-align: center;
    }

    .app {
      min-height: 100vh;
      background: #000;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .brand {
      font-size: 18px;
      font-weight: 700;
      white-space: nowrap;
    }

    .search-wrap {
      flex: 1;
    }

    .search-wrap input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 15px;
      outline: none;
    }

    .logout-btn {
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
    }

    .video-feed {
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 14px 0 28px;
    }

    .video-card {
      width: min(100vw, 520px);
      margin: 0 auto;
      padding: 0 10px;
    }

    .video-shell {
      position: relative;
      width: 100%;
      aspect-ratio: 9 / 16;
      background: #0f172a;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 16px 40px rgba(0,0,0,0.35);
    }

    .media-wrap {
      position: absolute;
      inset: 0;
      background: #000;
    }

    .media-wrap iframe,
    .media-wrap video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #000;
    }

    .media-wrap video {
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.88) 0%,
        rgba(0,0,0,0.4) 30%,
        rgba(0,0,0,0.08) 55%,
        rgba(0,0,0,0.15) 100%
      );
    }

    .video-info {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 3;
      padding: 18px 16px 18px;
      pointer-events: none;
    }

    .tag {
      display: inline-block;
      margin-bottom: 12px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      font-size: 13px;
      color: #fff;
    }

    .video-title {
      font-size: 20px;
      font-weight: 800;
      margin: 0 0 8px;
      line-height: 1.25;
    }

    .video-desc {
      margin: 0;
      color: #e2e8f0;
      font-size: 15px;
      line-height: 1.45;
      max-width: 85%;
    }

    .action-bar {
      position: absolute;
      right: 12px;
      bottom: 18px;
      z-index: 4;
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: auto;
    }

    .action-btn {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.42);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
    }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: #cbd5e1;
    }

    @media (max-width: 768px) {
      .topbar {
        padding: 10px;
        gap: 8px;
      }

      .brand {
        font-size: 16px;
      }

      .search-wrap input {
        padding: 11px 13px;
        font-size: 14px;
      }

      .logout-btn {
        padding: 9px 12px;
        font-size: 13px;
      }

      .video-card {
        width: 100vw;
        padding: 0 6px;
      }

      .video-shell {
        border-radius: 18px;
      }

      .video-title {
        font-size: 18px;
      }

      .video-desc {
        font-size: 14px;
        max-width: 82%;
      }
    }
  </style>
</head>
<body>

  <section id="loginScreen" class="login-screen">
    <div class="login-box">
      <h1>Kho phim riêng</h1>
      <p>Xem video 9:16 kiểu TikTok. Nhập mật khẩu để truy cập nội dung bên trong.</p>
      <input type="password" id="password" placeholder="Nhập mật khẩu" />
      <button onclick="checkPassword()">Vào xem</button>
      <div id="errorMsg" class="error hidden">Sai mật khẩu.</div>
    </div>
  </section>

  <main id="app" class="app hidden">
    <div class="topbar">
      <div class="brand">Kho phim riêng</div>
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Tìm tên phim, thể loại..." />
      </div>
      <button class="logout-btn" onclick="logout()">Đăng xuất</button>
    </div>

    <div id="videoFeed" class="video-feed"></div>
    <div id="emptyState" class="empty-state hidden">Không tìm thấy video phù hợp.</div>
  </main>

  <script>
    const SITE_PASSWORD = "vt090617";

    const videos = [
      {
        title: "Phim tập 1",
        category: "Hành động",
        description: "Nội dung mô tả ngắn.",
        type: "drive",
        src: "https://drive.google.com/file/d/1NDL14Q1fQSRCqFKKfYltScF3Cg_r-D_Q/preview"
      },
      {
        title: "Phim tập 2",
        category: "Tình cảm",
        description: "Nội dung mô tả ngắn.",
        type: "drive",
        src: "https://drive.google.com/file/d/1n9iveTvzheVzGcakjdEK139PLbY3JQVT/preview"
      },
      {
        title: "Phim tập 5",
        category: "Hành động",
        description: "Nội dung mô tả ngắn.",
        type: "drive",
        src: "https://drive.google.com/file/d/1-0MdcojXwYYdqerNWkYgGw-vkXNMwo95/preview"
      },
      {
        title: "Phim tập 6",
        category: "Hành động",
        description: "Nội dung mô tả ngắn.",
        type: "drive",
        src: "https://drive.google.com/file/d/1DFhmJjPXlEVuGEfnHxna9MaPEovV1Iq5/preview"
      },
      {
        title: "Phim tập 7",
        category: "Hành động",
        description: "Nội dung mô tả ngắn.",
        type: "youtube",
        src: "https://www.youtube.com/embed/2zRsr2hxO5E"
      }
    ];

    function createMedia(video) {
      if (video.type === "video") {
        return `
          <video controls playsinline preload="metadata">
            <source src="${video.src}" type="video/mp4">
          </video>
        `;
      }

      return `
        <iframe
          src="${video.src}"
          allow="autoplay; encrypted-media"
          allowfullscreen>
        </iframe>
      `;
    }

    function renderVideos(list) {
      const feed = document.getElementById("videoFeed");
      const empty = document.getElementById("emptyState");

      if (!list.length) {
        feed.innerHTML = "";
        empty.classList.remove("hidden");
        return;
      }

      empty.classList.add("hidden");

      feed.innerHTML = list.map((video, index) => `
        <article class="video-card movie-item" data-search="${(video.title + ' ' + video.category + ' ' + video.description).toLowerCase()}">
          <div class="video-shell">
            <div class="media-wrap">
              ${createMedia(video)}
            </div>

            <div class="overlay"></div>

            <div class="video-info">
              <div class="tag">${video.category}</div>
              <h3 class="video-title">${video.title}</h3>
              <p class="video-desc">${video.description}</p>
            </div>

            <div class="action-bar">
              <button class="action-btn" onclick="scrollToCard(${index - 1})">↑</button>
              <button class="action-btn" onclick="scrollToCard(${index + 1})">↓</button>
            </div>
          </div>
        </article>
      `).join("");
    }

    function scrollToCard(index) {
      const cards = document.querySelectorAll(".video-card");
      if (index < 0 || index >= cards.length) return;
      cards[index].scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function checkPassword() {
      const pass = document.getElementById("password").value;
      const errorMsg = document.getElementById("errorMsg");

      if (pass === SITE_PASSWORD) {
        document.getElementById("loginScreen").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        errorMsg.classList.add("hidden");
        renderVideos(videos);
      } else {
        errorMsg.classList.remove("hidden");
      }
    }

    function logout() {
      document.getElementById("app").classList.add("hidden");
      document.getElementById("loginScreen").classList.remove("hidden");
      document.getElementById("password").value = "";
      document.getElementById("searchInput").value = "";
      document.getElementById("videoFeed").innerHTML = "";
    }

    document.addEventListener("DOMContentLoaded", function () {
      const searchInput = document.getElementById("searchInput");

      searchInput.addEventListener("input", function () {
        const keyword = this.value.toLowerCase().trim();

        if (!keyword) {
          renderVideos(videos);
          return;
        }

        const filtered = videos.filter(video => {
          const text = (video.title + " " + video.category + " " + video.description).toLowerCase();
          return text.includes(keyword);
        });

        renderVideos(filtered);
      });
    });
  </script>

</body>
</html>
