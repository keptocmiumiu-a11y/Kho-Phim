<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kho phim riêng</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: #fff;
    }

    body {
      overflow-x: hidden;
    }

    .hidden {
      display: none !important;
    }

    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(180deg, #111827, #0f172a);
    }

    .login-box {
      width: 100%;
      max-width: 420px;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 18px;
      padding: 24px;
    }

    .login-box h2 {
      margin: 0 0 12px;
      text-align: center;
      font-size: 28px;
    }

    .login-box p {
      margin: 0 0 18px;
      text-align: center;
      color: #cbd5e1;
      line-height: 1.5;
    }

    .login-box input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #475569;
      background: #0b1220;
      color: #fff;
      outline: none;
      margin-bottom: 12px;
      font-size: 16px;
    }

    .login-box button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #22c55e;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .error {
      margin-top: 10px;
      color: #fca5a5;
      text-align: center;
    }

    .app {
      min-height: 100vh;
      background: #0b1220;
    }

    .hero-header {
      text-align: center;
      padding: 42px 20px 24px;
      background: linear-gradient(180deg, #111827, #0f172a);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .hero-header h1 {
      margin: 0 0 12px;
      font-size: 52px;
      font-weight: 800;
    }

    .hero-header p {
      margin: 0 auto;
      max-width: 760px;
      color: #cbd5e1;
      line-height: 1.5;
      font-size: 20px;
    }

    .browse-bar {
      width: min(100%, 1100px);
      margin: 0 auto;
      padding: 22px 18px 8px;
    }

    .browse-bar h2 {
      margin: 0 0 16px;
      font-size: 28px;
      font-weight: 800;
    }

    .search-wrap {
      width: 100%;
    }

    .search-wrap input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 16px;
      outline: none;
    }

    .video-feed {
      display: flex;
      flex-direction: column;
      gap: 24px;
      padding: 12px 0 30px;
    }

    .video-card {
      width: min(100%, 560px);
      margin: 0 auto;
      padding: 0 10px;
    }

    .video-shell {
      position: relative;
      width: 100%;
      aspect-ratio: 9 / 16;
      background: #0f172a;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 16px 40px rgba(0,0,0,0.35);
    }

    .media-wrap {
      position: absolute;
      inset: 0;
      background: #000;
    }

    .media-wrap iframe,
    .media-wrap video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #000;
    }

    .media-wrap video {
      object-fit: cover;
    }

    .poster-box {
      position: absolute;
      inset: 0;
      cursor: pointer;
      overflow: hidden;
      background: #000;
    }

    .poster-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .play-btn {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 86px;
      height: 86px;
      border: none;
      border-radius: 999px;
      background: rgba(255,255,255,0.25);
      color: #fff;
      font-size: 34px;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }

    .open-external {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 12px;
      background: rgba(0,0,0,0.45);
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      z-index: 6;
      backdrop-filter: blur(4px);
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.88) 0%,
        rgba(0,0,0,0.42) 28%,
        rgba(0,0,0,0.06) 60%,
        rgba(0,0,0,0.16) 100%
      );
      z-index: 2;
    }

    .video-info {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 4;
      padding: 18px 16px 18px;
      pointer-events: none;
    }

    .tag {
      display: inline-block;
      margin-bottom: 12px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      font-size: 13px;
      color: #fff;
    }

    .video-title {
      font-size: 20px;
      font-weight: 800;
      margin: 0 0 8px;
      line-height: 1.25;
    }

    .video-desc {
      margin: 0;
      color: #e2e8f0;
      font-size: 15px;
      line-height: 1.45;
      max-width: 85%;
    }

    .action-bar {
      position: absolute;
      right: 12px;
      bottom: 18px;
      z-index: 5;
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: auto;
    }

    .action-btn {
      width: 52px;
      height: 52px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.42);
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: #cbd5e1;
    }

    @media (max-width: 768px) {
      .hero-header {
        padding: 28px 14px 18px;
      }

      .hero-header h1 {
        font-size: 26px;
      }

      .hero-header p {
        font-size: 15px;
      }

      .browse-bar {
        padding: 14px 10px 8px;
      }

      .browse-bar h2 {
        font-size: 20px;
        margin-bottom: 12px;
      }

      .search-wrap input {
        padding: 12px 14px;
        font-size: 15px;
      }

      .video-card {
        width: 100vw;
        padding: 0 6px;
      }

      .video-shell {
        border-radius: 18px;
      }

      .video-title {
        font-size: 18px;
      }

      .video-desc {
        font-size: 14px;
        max-width: 82%;
      }

      .play-btn {
        width: 78px;
        height: 78px;
        font-size: 30px;
      }

      .open-external {
        width: 44px;
        height: 44px;
        font-size: 20px;
      }

      .action-btn {
        width: 48px;
        height: 48px;
      }
    }
  </style>
</head>
<body>

  <section id="loginScreen" class="login-screen">
    <div class="login-box">
      <h2>Kho phim hay</h2>
      <p>Xem phim chọn lọc mỗi ngày. Nhập mật khẩu tại tainhanhvideo.com để truy cập nội dung bên trong</p>
      <input type="password" id="password" placeholder="Nhập mật khẩu" />
      <button onclick="checkPassword()">Vào xem</button>
      <div id="errorMsg" class="error hidden">Sai mật khẩu.</div>
    </div>
  </section>

  <main id="app" class="app hidden">
    <header class="hero-header">
      <h1>Kho phim hay</h1>
      <p>Chúc Quý khách xem phim vui vẻ<3</p>
    </header>

    <section class="browse-bar">
      <h2>Nhập tên phim vào ô bên dưới</h2>
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Tìm tên phim..." />
      </div>
    </section>

    <div id="videoFeed" class="video-feed"></div>
    <div id="emptyState" class="empty-state hidden">Không tìm thấy video phù hợp.</div>
  </main>

  <script>
    const SITE_PASSWORD = "vt090617";

    const videos = [
      {
        title: "Phim tập 1",
        category: "Hành động",
        description: "Capcut pro miễn phí tại tainhanhvideo.com",
        type: "drive",
        link: "https://drive.google.com/file/d/1DFhmJjPXlEVuGEfnHxna9MaPEovV1Iq5/view?usp=sharing",
        poster: "https://drive.google.com/thumbnail?id=1DFhmJjPXlEVuGEfnHxna9MaPEovV1Iq5&sz=w1200"
      },
      {
        title: "Phim tập 2",
        category: "Tình cảm",
        description: "Capcut pro miễn phí tại tainhanhvideo.com",
        type: "drive",
        src: "https://drive.google.com/file/d/1n9iveTvzheVzGcakjdEK139PLbY3JQVT/preview",
        link: "https://drive.google.com/file/d/1n9iveTvzheVzGcakjdEK139PLbY3JQVT/view?usp=sharing",
        poster: "https://drive.google.com/thumbnail?id=1n9iveTvzheVzGcakjdEK139PLbY3JQVT&sz=w1000"
      },
      {
        title: "Phim tập 5",
        category: "Hành động",
        description: "Capcut pro miễn phí tại tainhanhvideo.com",
        type: "drive",
        src: "https://drive.google.com/file/d/1-0MdcojXwYYdqerNWkYgGw-vkXNMwo95/preview",
        link: "https://drive.google.com/file/d/1-0MdcojXwYYdqerNWkYgGw-vkXNMwo95/view?usp=sharing",
        poster: "https://drive.google.com/thumbnail?id=1-0MdcojXwYYdqerNWkYgGw-vkXNMwo95&sz=w1000"
      },
      {
        title: "Phim tập 6",
        category: "Hành động",
        description: "Capcut pro miễn phí tại tainhanhvideo.com",
        type: "drive",
        src: "https://drive.google.com/file/d/1DFhmJjPXlEVuGEfnHxna9MaPEovV1Iq5/preview",
        link: "https://drive.google.com/file/d/1DFhmJjPXlEVuGEfnHxna9MaPEovV1Iq5/view?usp=sharing",
        poster: "https://drive.google.com/thumbnail?id=1DFhmJjPXlEVuGEfnHxna9MaPEovV1Iq5&sz=w1000"
      },
      {
        title: "Phim tập 7",
        category: "Hành động",
        description: "Capcut pro miễn phí tại tainhanhvideo.com",
        type: "youtube",
        src: "https://www.youtube.com/embed/2zRsr2hxO5E",
        link: "https://youtu.be/2zRsr2hxO5E",
        poster: "https://img.youtube.com/vi/2zRsr2hxO5E/maxresdefault.jpg"
      }
    ];

    let currentRenderedVideos = [...videos];

    function createMedia(video) {
      if (video.type === "video") {
        return `
          <video controls playsinline preload="metadata">
            <source src="${video.src}" type="video/mp4">
          </video>
        `;
      }

      return `
        <iframe
          src="${video.src}"
          allow="autoplay; encrypted-media"
          allowfullscreen>
        </iframe>
      `;
    }

    function openVideo(index) {
      const video = currentRenderedVideos[index];
      const wraps = document.querySelectorAll(".media-wrap");
      const wrap = wraps[index];
      if (!video || !wrap) return;

      wrap.innerHTML = createMedia(video);
    }

    function openExternal(index) {
      const video = currentRenderedVideos[index];
      if (!video || !video.link) return;
      window.open(video.link, "_blank");
    }

    function renderVideos(list) {
      currentRenderedVideos = [...list];

      const feed = document.getElementById("videoFeed");
      const empty = document.getElementById("emptyState");

      if (!list.length) {
        feed.innerHTML = "";
        empty.classList.remove("hidden");
        return;
      }

      empty.classList.add("hidden");

      feed.innerHTML = list.map((video, index) => `
        <article class="video-card movie-item">
          <div class="video-shell">
            <div class="media-wrap">
              <div class="poster-box" onclick="openVideo(${index})">
                <img src="${video.poster}" alt="${video.title}" class="poster-img">
                <button class="play-btn" type="button">▶</button>
              </div>
            </div>

            <button class="open-external" type="button" onclick="openExternal(${index})">↗</button>

            <div class="overlay"></div>

            <div class="video-info">
              <div class="tag">${video.category}</div>
              <h3 class="video-title">${video.title}</h3>
              <p class="video-desc">${video.description}</p>
            </div>

            <div class="action-bar">
              <button class="action-btn" type="button" onclick="scrollToCard(${index - 1})">↑</button>
              <button class="action-btn" type="button" onclick="scrollToCard(${index + 1})">↓</button>
            </div>
          </div>
        </article>
      `).join("");
    }

    function scrollToCard(index) {
      const cards = document.querySelectorAll(".video-card");
      if (index < 0 || index >= cards.length) return;
      cards[index].scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function checkPassword() {
      const pass = document.getElementById("password").value;
      const errorMsg = document.getElementById("errorMsg");

      if (pass === SITE_PASSWORD) {
        document.getElementById("loginScreen").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        errorMsg.classList.add("hidden");
        renderVideos(videos);
      } else {
        errorMsg.classList.remove("hidden");
      }
    }

    document.addEventListener("DOMContentLoaded", function () {
      const searchInput = document.getElementById("searchInput");

      searchInput.addEventListener("input", function () {
        const keyword = this.value.toLowerCase().trim();

        if (!keyword) {
          renderVideos(videos);
          return;
        }

        const filtered = videos.filter(video => {
          const text = (video.title + " " + video.category + " " + video.description).toLowerCase();
          return text.includes(keyword);
        });

        renderVideos(filtered);
      });
    });
  </script>

</body>
</html>
